name: NNZ MVP CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify MVP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nnz-mvp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nnz-mvp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build demo
        run: npm run build:demo

      - name: Audit dependencies
        run: npm audit
